root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/restaurantsaas ./cmd/api"
  bin = "./tmp/restaurantsaas"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = 2000

[log]
  time = true

[misc]
  clean_on_exit = true
